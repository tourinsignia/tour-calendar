<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@500;600;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#122B29;
    --paper:#F3F1E9;
    --panel:#FFFFFF;
    --teal:#1F6F68;
    --teal-dark:#154F4A;
    --gold:#C89B3C;
    --line:#DCD6C6;
    --muted:#6B7A75;
    --confirmed:#2F8F5B;
    --confirmed-bg:#E3F3E9;
    --pending:#C97A2B;
    --pending-bg:#FBEBDA;
    --sheet:#3E6EA5;
    --sheet-bg:#E4ECF7;
    --danger:#B4453D;
    --radius:10px;
    --shadow: 0 2px 10px rgba(18,43,41,0.06), 0 1px 2px rgba(18,43,41,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Hind Siliguri', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3, .brand{font-family:'Baloo Da 2', 'Hind Siliguri', sans-serif;}

  /* ---------- Top bar ---------- */
  .topbar{
    background:var(--ink);
    color:#EFEAD8;
    padding:16px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:700;
    letter-spacing:0.3px;
  }
  .brand .mark{
    width:32px;height:32px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, var(--gold), #8a6a1f 75%);
    position:relative;
    flex:none;
  }
  .brand .mark::after{
    content:"";
    position:absolute; inset:8px;
    border-radius:50%;
    border:2px solid var(--ink);
    border-right-color:transparent;
    border-bottom-color:transparent;
    transform:rotate(45deg);
  }
  .month-nav{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .month-nav button{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.18);
    color:#EFEAD8;
    width:34px;height:34px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s ease;
  }
  .month-nav button:hover{ background:rgba(255,255,255,0.18); }
  .month-label{
    min-width:150px;
    text-align:center;
    font-size:16px;
    font-weight:600;
  }
  .today-btn{
    background:transparent;
    border:1px solid rgba(255,255,255,0.3);
    color:#EFEAD8;
    padding:7px 14px;
    border-radius:8px;
    cursor:pointer;
    font-family:inherit;
    font-size:14px;
  }
  .today-btn:hover{ background:rgba(255,255,255,0.1); }

  /* ---------- Layout ---------- */
  .layout{
    display:grid;
    grid-template-columns:340px 1fr;
    gap:20px;
    padding:20px;
    align-items:start;
  }
  @media (max-width:900px){
    .layout{grid-template-columns:1fr;}
  }

  /* ---------- Form ---------- */
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }
  .form-card{
    padding:20px;
    position:sticky;
    top:20px;
  }
  .form-card h2{
    margin:0 0 4px 0;
    font-size:18px;
    color:var(--teal-dark);
  }
  .form-card .sub{
    margin:0 0 18px 0;
    font-size:13px;
    color:var(--muted);
  }
  label{
    display:block;
    font-size:13px;
    font-weight:600;
    margin:14px 0 6px;
    color:var(--ink);
  }
  label:first-of-type{margin-top:0;}
  input, select{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    font-family:'Hind Siliguri', sans-serif;
    font-size:14px;
    background:#FCFBF7;
    color:var(--ink);
  }
  input:focus, select:focus{
    outline:none;
    border-color:var(--teal);
    box-shadow:0 0 0 3px rgba(31,111,104,0.15);
  }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .add-btn{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:var(--teal);
    color:#fff;
    border:none;
    border-radius:8px;
    font-family:'Hind Siliguri', sans-serif;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s ease, transform .05s ease;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .add-btn:hover{ background:var(--teal-dark); }
  .add-btn:active{ transform:scale(0.99); }
  .err{
    color:var(--danger);
    font-size:12.5px;
    margin-top:6px;
    min-height:16px;
  }

  /* ---------- Calendar ---------- */
  .cal-card{ padding:20px; }
  .weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
    margin-bottom:8px;
  }
  .weekdays div{
    text-align:center;
    font-size:12.5px;
    font-weight:600;
    color:var(--muted);
    padding-bottom:4px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
  }
  .day{
    min-height:96px;
    border:1px dashed var(--line);
    border-radius:8px;
    padding:8px;
    background:#FCFBF7;
    cursor:default;
    display:flex;
    flex-direction:column;
    gap:6px;
    transition:box-shadow .15s ease, border-color .15s ease;
  }
  .day.empty{ background:transparent; border:none; }
  .day.has-entries{ cursor:pointer; border-style:solid; }
  .day.has-entries:hover{ box-shadow:var(--shadow); border-color:var(--teal); }
  .day.today{ border-color:var(--gold); background:#FFFBF0; }
  .day-num{
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    display:flex; justify-content:space-between; align-items:center;
  }
  .day-count{
    font-size:10.5px;
    background:var(--teal);
    color:#fff;
    border-radius:20px;
    padding:1px 7px;
    font-weight:600;
  }
  .chip{
    font-size:11px;
    padding:3px 6px;
    border-radius:5px;
    border-left:3px solid var(--muted);
    background:#fff;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .chip.confirmed{ border-color:var(--confirmed); background:var(--confirmed-bg); }
  .chip.pending{ border-color:var(--pending); background:var(--pending-bg); }
  .chip.sheet-entry{ border-color:var(--sheet); background:var(--sheet-bg); }
  .more-tag{
    font-size:10.5px;
    color:var(--muted);
    padding-left:2px;
  }

  /* ---------- Summary ---------- */
  .summary{
    margin-top:20px;
    padding:20px;
  }
  .summary h2{
    margin:0 0 14px 0;
    font-size:18px;
    color:var(--teal-dark);
  }
  .stat-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
  }
  @media (max-width:700px){ .stat-grid{ grid-template-columns:repeat(2,1fr);} }
  .stat{
    background:#FCFBF7;
    border:1px solid var(--line);
    border-radius:8px;
    padding:14px;
  }
  .stat .num{ font-size:22px; font-weight:700; color:var(--teal-dark); font-family:'Baloo Da 2', sans-serif; }
  .stat .lbl{ font-size:12px; color:var(--muted); margin-top:2px; }
  .status-breakdown{
    display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;
  }
  .badge{
    font-size:12.5px;
    padding:6px 12px;
    border-radius:20px;
    font-weight:600;
  }
  .badge.confirmed{ background:var(--confirmed-bg); color:var(--confirmed); }
  .badge.pending{ background:var(--pending-bg); color:var(--pending); }
  .badge.sheet-entry{ background:var(--sheet-bg); color:var(--sheet); }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(18,43,41,0.45);
    display:none;
    align-items:center; justify-content:center;
    padding:20px;
    z-index:50;
  }
  .overlay.show{ display:flex; }
  .modal{
    background:#fff;
    border-radius:12px;
    max-width:520px;
    width:100%;
    max-height:82vh;
    overflow-y:auto;
    box-shadow:0 12px 40px rgba(0,0,0,0.25);
  }
  .modal-head{
    padding:18px 20px;
    border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:center;
    position:sticky; top:0; background:#fff;
  }
  .modal-head h3{ margin:0; font-size:17px; color:var(--teal-dark); }
  .modal-close{
    border:none; background:none; font-size:20px; cursor:pointer; color:var(--muted);
    width:30px;height:30px;
  }
  .modal-body{ padding:14px 20px 20px; display:flex; flex-direction:column; gap:12px; }
  .entry-row{
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px;
  }
  .entry-top{
    display:flex; justify-content:space-between; align-items:flex-start; gap:10px;
    margin-bottom:8px;
  }
  .entry-name{ font-weight:700; font-size:14.5px; }
  .entry-dest{ font-size:12.5px; color:var(--muted); margin-top:2px; }
  .entry-meta{
    font-size:12.5px; color:var(--ink); display:flex; gap:14px; margin-top:6px; flex-wrap:wrap;
  }
  .entry-meta span b{ color:var(--teal-dark); }
  .entry-actions{ display:flex; gap:8px; align-items:center; margin-top:10px; }
  .status-select{
    padding:6px 8px; font-size:12.5px; border-radius:6px; border:1px solid var(--line); flex:1;
  }
  .del-btn{
    border:1px solid var(--danger); color:var(--danger); background:#fff;
    border-radius:6px; padding:6px 10px; font-size:12.5px; cursor:pointer;
  }
  .del-btn:hover{ background:#FBEAE8; }
  .empty-modal{ text-align:center; color:var(--muted); padding:30px 0; font-size:13.5px; }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#EFEAD8;
    padding:12px 18px; border-radius:8px; font-size:13.5px;
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease;
    z-index:100; box-shadow:0 6px 20px rgba(0,0,0,0.25);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="mark"></span> Tour Calendar</div>
  <div class="month-nav">
    <button id="prevBtn" aria-label="Previous Month">‹</button>
    <div class="month-label" id="monthLabel">—</div>
    <button id="nextBtn" aria-label="Next Month">›</button>
    <button class="today-btn" id="todayBtn">Today</button>
  </div>
</div>

<div class="layout">

  <div class="card form-card">
    <h2>New Tour Entry</h2>
    <p class="sub">Add details — Form clears after submission.</p>

    <label for="f-date">Date</label>
    <input type="date" id="f-date">

    <label for="f-name">Tourist Name</label>
    <input type="text" id="f-name" placeholder="e.g., John Doe">

    <label for="f-dest">Destination</label>
    <input type="text" id="f-dest" placeholder="e.g., Sajek Valley">

    <div class="row2">
      <div>
        <label for="f-people">Persons</label>
        <input type="number" id="f-people" min="1" placeholder="0">
      </div>
      <div>
        <label for="f-amount">Amount</label>
        <input type="number" id="f-amount" min="0" placeholder="0">
      </div>
    </div>

    <label for="f-status">Status</label>
    <select id="f-status">
      <option value="pending">Pending</option>
      <option value="confirmed">Confirmed</option>
      <option value="sheet-entry">Sheet Entry</option>
    </select>

    <div class="err" id="formErr"></div>

    <button class="add-btn" id="addBtn">+ Add Tour</button>
  </div>

  <div>
    <div class="card cal-card">
      <div class="weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div class="grid" id="calGrid"></div>
    </div>

    <div class="card summary">
      <h2 id="summaryTitle">Monthly Summary</h2>
      <div class="stat-grid">
        <div class="stat"><div class="num" id="statTours">0</div><div class="lbl">Total Tours</div></div>
        <div class="stat"><div class="num" id="statPeople">0</div><div class="lbl">Total Tourists</div></div>
        <div class="stat"><div class="num" id="statAmount">0৳</div><div class="lbl">Total Earnings</div></div>
        <div class="stat"><div class="num" id="statDays">0</div><div class="lbl">Active Days</div></div>
      </div>
      <div class="status-breakdown" id="statusBreakdown"></div>
    </div>
  </div>

</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalDate">—</h3>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  function toBn(n){
    return String(n);
  }
  function money(n){
    return toBn(Math.round(n).toLocaleString('en-IN')) + '৳';
  }

  const STATUS_LABEL = { confirmed:'Confirmed', pending:'Pending', 'sheet-entry':'Sheet Entry' };
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const WEEKDAY_START = 0; // Sunday

  let entries = [];
  const today = new Date();
  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth(); // 0-indexed

  const els = {
    prevBtn: document.getElementById('prevBtn'),
    nextBtn: document.getElementById('nextBtn'),
    todayBtn: document.getElementById('todayBtn'),
    monthLabel: document.getElementById('monthLabel'),
    calGrid: document.getElementById('calGrid'),
    addBtn: document.getElementById('addBtn'),
    formErr: document.getElementById('formErr'),
    date: document.getElementById('f-date'),
    name: document.getElementById('f-name'),
    dest: document.getElementById('f-dest'),
    people: document.getElementById('f-people'),
    amount: document.getElementById('f-amount'),
    status: document.getElementById('f-status'),
    summaryTitle: document.getElementById('summaryTitle'),
    statTours: document.getElementById('statTours'),
    statPeople: document.getElementById('statPeople'),
    statAmount: document.getElementById('statAmount'),
    statDays: document.getElementById('statDays'),
    statusBreakdown: document.getElementById('statusBreakdown'),
    overlay: document.getElementById('overlay'),
    modalDate: document.getElementById('modalDate'),
    modalBody: document.getElementById('modalBody'),
    modalClose: document.getElementById('modalClose'),
    toast: document.getElementById('toast'),
  };

  function pad(n){ return n < 10 ? '0'+n : ''+n; }
  function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

  // ---------- Storage ----------
  async function loadEntries(){
    try{
      const res = await window.storage.get('tour-entries-v1', false);
      entries = res && res.value ? JSON.parse(res.value) : [];
    }catch(e){
      entries = [];
    }
    renderAll();
  }
  async function saveEntries(){
    try{
      await window.storage.set('tour-entries-v1', JSON.stringify(entries), false);
    }catch(e){
      showToast('⚠️ Saving error');
    }
  }

  // ---------- Sound ----------
  function playChime(){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [660, 880];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.001, ctx.currentTime + i*0.1);
        gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + i*0.1 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.1 + 0.25);
        osc.connect(gain).connect(ctx.destination);
        osc.start(ctx.currentTime + i*0.1);
        osc.stop(ctx.currentTime + i*0.1 + 0.3);
      });
    }catch(e){ /* audio not available, ignore */ }
  }

  // ---------- Toast ----------
  let toastTimer;
  function showToast(msg){
    els.toast.textContent = msg;
    els.toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => els.toast.classList.remove('show'), 2200);
  }

  // ---------- Form ----------
  function resetForm(keepDate){
    const d = els.date.value;
    els.name.value = '';
    els.dest.value = '';
    els.people.value = '';
    els.amount.value = '';
    els.status.value = 'pending';
    els.formErr.textContent = '';
    if(!keepDate) els.date.value = '';
    else els.date.value = d;
  }

  function addEntry(){
    const date = els.date.value;
    const name = els.name.value.trim();
    const dest = els.dest.value.trim();
    const people = parseInt(els.people.value, 10);
    const amount = parseFloat(els.amount.value);
    const status = els.status.value;

    if(!date || !name || !dest || !els.people.value || !els.amount.value){
      els.formErr.textContent = 'Please fill in all fields.';
      return;
    }
    if(isNaN(people) || people <= 0){
      els.formErr.textContent = 'Enter valid number of persons.';
      return;
    }
    if(isNaN(amount) || amount < 0){
      els.formErr.textContent = 'Enter a valid amount.';
      return;
    }
    els.formErr.textContent = '';

    entries.push({
      id: 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,8),
      date, name, destination: dest,
      people, amount, status,
      createdAt: Date.now()
    });
    saveEntries();

    const [y,m] = date.split('-').map(Number);
    viewYear = y; viewMonth = m - 1;

    resetForm(false);
    playChime();
    showToast('✓ Tour entry added');
    renderAll();
  }

  // ---------- Calendar render ----------
  function renderCalendar(){
    els.monthLabel.textContent = `${MONTH_NAMES[viewMonth]} ${toBn(viewYear)}`;
    els.calGrid.innerHTML = '';

    const firstDay = new Date(viewYear, viewMonth, 1);
    const startOffset = (firstDay.getDay() - WEEKDAY_START + 7) % 7;
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    const byDate = {};
    entries.forEach(e => {
      if(!byDate[e.date]) byDate[e.date] = [];
      byDate[e.date].push(e);
    });

    for(let i=0;i<startOffset;i++){
      const empty = document.createElement('div');
      empty.className = 'day empty';
      els.calGrid.appendChild(empty);
    }

    const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

    for(let d=1; d<=daysInMonth; d++){
      const key = dateKey(viewYear, viewMonth, d);
      const dayEntries = byDate[key] || [];
      const cell = document.createElement('div');
      cell.className = 'day' + (dayEntries.length ? ' has-entries' : '') + (key === todayKey ? ' today' : '');

      const numRow = document.createElement('div');
      numRow.className = 'day-num';
      numRow.innerHTML = `<span>${toBn(d)}</span>` + (dayEntries.length ? `<span class="day-count">${toBn(dayEntries.length)}</span>` : '');
      cell.appendChild(numRow);

      const shown = dayEntries.slice(0,3);
      shown.forEach(en => {
        const chip = document.createElement('div');
        chip.className = 'chip ' + en.status;
        chip.textContent = en.name;
        cell.appendChild(chip);
      });
      if(dayEntries.length > 3){
        const more = document.createElement('div');
        more.className = 'more-tag';
        more.textContent = `+ More ${toBn(dayEntries.length - 3)}`;
        cell.appendChild(more);
      }

      if(dayEntries.length){
        cell.addEventListener('click', () => openModal(key));
      }
      els.calGrid.appendChild(cell);
    }
  }

  // ---------- Summary ----------
  function renderSummary(){
    const monthEntries = entries.filter(e => {
      const [y,m] = e.date.split('-').map(Number);
      return y === viewYear && (m-1) === viewMonth;
    });

    els.summaryTitle.textContent = `${MONTH_NAMES[viewMonth]} ${toBn(viewYear)} — Monthly Summary`;

    const totalTours = monthEntries.length;
    const totalPeople = monthEntries.reduce((s,e)=>s+e.people,0);
    const totalAmount = monthEntries.reduce((s,e)=>s+e.amount,0);
    const activeDays = new Set(monthEntries.map(e=>e.date)).size;

    els.statTours.textContent = toBn(totalTours);
    els.statPeople.textContent = toBn(totalPeople);
    els.statAmount.textContent = money(totalAmount);
    els.statDays.textContent = toBn(activeDays);

    const counts = { confirmed:0, pending:0, 'sheet-entry':0 };
    monthEntries.forEach(e => counts[e.status] = (counts[e.status]||0) + 1);

    els.statusBreakdown.innerHTML = '';
    Object.keys(STATUS_LABEL).forEach(st => {
      const b = document.createElement('span');
      b.className = 'badge ' + st;
      b.textContent = `${STATUS_LABEL[st]}: ${toBn(counts[st]||0)}`;
      els.statusBreakdown.appendChild(b);
    });
  }

  // ---------- Modal ----------
  function openModal(key){
    const dayEntries = entries.filter(e => e.date === key).sort((a,b)=>a.createdAt-b.createdAt);
    const [y,m,d] = key.split('-').map(Number);
    els.modalDate.textContent = `${toBn(d)} ${MONTH_NAMES[m-1]} ${toBn(y)}`;
    els.modalBody.innerHTML = '';

    if(!dayEntries.length){
      els.modalBody.innerHTML = '<div class="empty-modal">No tours on this day.</div>';
    } else {
      dayEntries.forEach(en => {
        const row = document.createElement('div');
        row.className = 'entry-row';
        row.innerHTML = `
          <div class="entry-top">
            <div>
              <div class="entry-name">${escapeHtml(en.name)}</div>
              <div class="entry-dest">📍 ${escapeHtml(en.destination)}</div>
            </div>
          </div>
          <div class="entry-meta">
            <span>👥 <b>${toBn(en.people)}</b> Persons</span>
            <span>💰 <b>${money(en.amount)}</b></span>
          </div>
          <div class="entry-actions">
            <select class="status-select" data-id="${en.id}">
              <option value="pending" ${en.status==='pending'?'selected':''}>Pending</option>
              <option value="confirmed" ${en.status==='confirmed'?'selected':''}>Confirmed</option>
              <option value="sheet-entry" ${en.status==='sheet-entry'?'selected':''}>Sheet Entry</option>
            </select>
            <button class="del-btn" data-id="${en.id}">Delete</button>
          </div>
        `;
        els.modalBody.appendChild(row);
      });

      els.modalBody.querySelectorAll('.status-select').forEach(sel => {
        sel.addEventListener('change', (ev) => {
          const id = ev.target.getAttribute('data-id');
          const entry = entries.find(e => e.id === id);
          if(entry){
            entry.status = ev.target.value;
            saveEntries();
            renderCalendar();
            renderSummary();
            showToast('✓ Status updated');
          }
        });
      });
      els.modalBody.querySelectorAll('.del-btn').forEach(btn => {
        btn.addEventListener('click', (ev) => {
          const id = ev.target.getAttribute('data-id');
          if(confirm('Do you want to delete this entry?')){
            entries = entries.filter(e => e.id !== id);
            saveEntries();
            renderCalendar();
            renderSummary();
            openModal(key);
            showToast('🗑️ Entry deleted');
          }
        });
      });
    }

    els.overlay.classList.add('show');
  }
  function closeModal(){ els.overlay.classList.remove('show'); }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderAll(){
    renderCalendar();
    renderSummary();
  }

  // ---------- Events ----------
  els.prevBtn.addEventListener('click', () => {
    viewMonth--; if(viewMonth<0){ viewMonth=11; viewYear--; }
    renderAll();
  });
  els.nextBtn.addEventListener('click', () => {
    viewMonth++; if(viewMonth>11){ viewMonth=0; viewYear++; }
    renderAll();
  });
  els.todayBtn.addEventListener('click', () => {
    viewYear = today.getFullYear(); viewMonth = today.getMonth();
    renderAll();
  });
  els.addBtn.addEventListener('click', addEntry);
  els.overlay.addEventListener('click', (e) => { if(e.target === els.overlay) closeModal(); });
  els.modalClose.addEventListener('click', closeModal);
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });

  // default date field to today
  els.date.value = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  loadEntries();
</script>
</body>
</html>
